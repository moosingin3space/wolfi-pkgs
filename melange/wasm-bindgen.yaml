package:
  name: wasm-bindgen
  version: 0.2.118
  epoch: 0
  description: Facilitating high-level interactions between Wasm modules and JavaScript
  copyright:
    - license: Apache-2.0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 753bb7ff4de2a00e30d2c6b56ee8e06a9e527f01
      repository: https://github.com/wasm-bindgen/wasm-bindgen
      tag: ${{package.version}}
  - uses: cargo/build
    with:
      modroot: crates/cli
      output: wasm-bindgen
