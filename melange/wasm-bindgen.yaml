package:
  name: wasm-bindgen
  version: 0.2.116
  epoch: 0
  description: Facilitating high-level interactions between Wasm modules and JavaScript
  copyright:
    - license: Apache-2.0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub

pipeline:
  - uses: git-checkout
    with:
      expected-commit: f2f701290ac7e9b7052175a47d0e83f2d10675c9
      repository: https://github.com/wasm-bindgen/wasm-bindgen
      tag: ${{package.version}}
  - uses: cargo/build
    with:
      modroot: crates/cli
      output: wasm-bindgen
