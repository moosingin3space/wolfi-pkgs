package:
  name: worker-build
  version: 0.8.1
  epoch: 0
  description: build Rust Cloudflare Workers into WASM binaries.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - wasm-pack
      - wasm-bindgen

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - openssl-dev

pipeline:
  - uses: git-checkout
    with:
      expected-commit: 209c230bfae6beb44855e0467c99913d76a1d09b
      repository: https://github.com/cloudflare/workers-rs
      tag: v${{package.version}}
      recurse-submodules: true
  - uses: cargo/build
    with:
      modroot: worker-build
      output: ${{package.name}}
