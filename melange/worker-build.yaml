package:
  name: worker-build
  version: 0.7.5
  epoch: 1
  description: build Rust Cloudflare Workers into WASM binaries.
  copyright:
    - license: Apache-2.0
  dependencies:
    runtime:
      - wasm-pack
      - wasm-bindgen

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub

pipeline:
  - uses: git-checkout
    with:
      expected-commit: ab960abbc66f0b6dea87ce0f89a01a821eeb3b5e
      repository: https://github.com/cloudflare/workers-rs
      tag: v${{package.version}}
      recurse-submodules: true
  - uses: cargo/build
    with:
      modroot: worker-build
      output: ${{package.name}}
